# Render Blueprint — deploy with "New > Blueprint" on render.com
# Docs: https://docs.render.com/blueprint-spec

databases:
  - name: spoon-db
    plan: free
    databaseName: spoon
    postgresMajorVersion: "16"

services:
  - type: web
    name: spoon-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma db push
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: spoon-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: "10000"
      - key: SMS_PROVIDER
        sync: false
      - key: SMS_API_KEY
        sync: false
      - key: SMS_TEMPLATE_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
